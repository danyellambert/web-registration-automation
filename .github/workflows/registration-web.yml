name: Registration Web (Cloud)

on:
  workflow_dispatch:
    inputs:
      max_records:
        description: "Maximum number of records (0 = no limit)"
        required: false
        default: "0"
      record_offset:
        description: "Skip the first N records"
        required: false
        default: "0"
      submission_confirmation_timeout:
        description: "Maximum submit confirmation wait time (seconds)"
        required: false
        default: "6"
      max_wait_without_evidence:
        description: "Maximum wait time without evidence before fallback (seconds)"
        required: false
        default: "2.5"
      partial_report_every:
        description: "Persist partial report every N records"
        required: false
        default: "10"
      partial_html_every:
        description: "Persist partial HTML every N records"
        required: false
        default: "25"
      save_final_html:
        description: "Save final HTML (1/0)"
        required: false
        default: "1"
      save_final_pdf:
        description: "Save final PDF (1/0)"
        required: false
        default: "0"
  schedule:
    - cron: "0 11 * * *"

permissions:
  contents: write

jobs:
  run-registration:
    # Optional cron: enable with Repository Variable ENABLE_REGISTRATION_SCHEDULE=true
    if: ${{ github.event_name != 'schedule' || vars.ENABLE_REGISTRATION_SCHEDULE == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      DASHBOARD_URL: https://web-registration-automation-dashboard.streamlit.app/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start local target site (self-hosted in runner)
        run: |
          nohup python -m http.server 8000 --directory web_page/pagina_exclusiva > /tmp/local_site.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/login.html >/dev/null; then
              echo "Local site is up on http://127.0.0.1:8000/login.html"
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/login.html >/dev/null

      - name: Run automation
        env:
          LOGIN_URL: "http://127.0.0.1:8000/login.html"
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
          HEADLESS: "1"
          KEEP_OPEN: "0"
          GENERATE_REPORT: "1"
          SAVE_FINAL_PDF: ${{ github.event_name == 'workflow_dispatch' && inputs.save_final_pdf || '0' }}
          SAVE_FINAL_HTML: ${{ github.event_name == 'workflow_dispatch' && inputs.save_final_html || '1' }}
          SUBMISSION_CONFIRMATION_TIMEOUT: ${{ github.event_name == 'workflow_dispatch' && inputs.submission_confirmation_timeout || '6' }}
          MAX_WAIT_WITHOUT_EVIDENCE: ${{ github.event_name == 'workflow_dispatch' && inputs.max_wait_without_evidence || '2.5' }}
          PARTIAL_REPORT_EVERY: ${{ github.event_name == 'workflow_dispatch' && inputs.partial_report_every || '10' }}
          PARTIAL_HTML_EVERY: ${{ github.event_name == 'workflow_dispatch' && inputs.partial_html_every || '25' }}
          RECORD_OFFSET: ${{ github.event_name == 'workflow_dispatch' && inputs.record_offset || '0' }}
          MAX_RECORDS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_records || '0' }}
        run: python cadastro_web.py

      - name: Debug local site log on failure
        if: failure()
        run: |
          echo "--- /tmp/local_site.log (last 200 lines) ---"
          tail -n 200 /tmp/local_site.log || true

      - name: Generate execution summary
        if: always()
        id: summary
        run: |
          python scripts/summarize_run.py \
            --logs-dir logs \
            --json-output logs/run_summary.json \
            --markdown-output logs/run_summary.md \
            --run-url "$RUN_URL"

      - name: Publish summary in GitHub UI
        if: always()
        run: |
          cat logs/run_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Update run history (analytics/history_runs.csv)
        if: always()
        run: |
          python scripts/update_history.py \
            --summary-json logs/run_summary.json \
            --history-csv analytics/history_runs.csv \
            --github-run-id "${{ github.run_id }}" \
            --github-run-number "${{ github.run_number }}" \
            --github-run-attempt "${{ github.run_attempt }}" \
            --repository "${{ github.repository }}" \
            --ref-name "${{ github.ref_name }}" \
            --actor "${{ github.actor }}" \
            --event-name "${{ github.event_name }}" \
            --run-url "$RUN_URL"

      - name: Update detailed history (analytics/detailed_runs.csv)
        if: always() && steps.summary.outputs.has_report == 'true'
        run: |
          python scripts/update_detailed_history.py \
            --report-csv "${{ steps.summary.outputs.report_path }}" \
            --detailed-csv analytics/detailed_runs.csv \
            --github-run-id "${{ github.run_id }}"

      - name: Commit analytics history
        if: always()
        id: commit_history
        continue-on-error: true
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add analytics/history_runs.csv analytics/detailed_runs.csv

          if git diff --staged --quiet; then
            echo "No history changes to commit."
            echo "commit_result=no_changes" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: update execution history (run ${{ github.run_id }})"

          git pull --rebase origin "$BRANCH_NAME" || true

          if git push origin "HEAD:$BRANCH_NAME"; then
            echo "commit_result=committed" >> "$GITHUB_OUTPUT"
          else
            echo "commit_result=push_failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Report history update status
        if: always()
        run: |
          case "${{ steps.commit_history.outputs.commit_result }}" in
            committed)
              {
                echo ""
                echo "## 🗂️ Consolidated history"
                echo "- ✅ History updated and pushed for \`analytics/history_runs.csv\` and \`analytics/detailed_runs.csv\`."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            no_changes)
              {
                echo ""
                echo "## 🗂️ Consolidated history"
                echo "- ℹ️ No history/detailed changes detected for this run."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            push_failed)
              {
                echo ""
                echo "## 🗂️ Consolidated history"
                echo "- ⚠️ History was generated, but push failed (check Actions write permissions)."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            *)
              {
                echo ""
                echo "## 🗂️ Consolidated history"
                echo "- ⚠️ Could not determine history update status."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac

      - name: Check SMTP/email settings
        if: always()
        id: email_config
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          missing=0
          for var in SMTP_SERVER SMTP_PORT SMTP_USERNAME SMTP_PASSWORD EMAIL_TO EMAIL_FROM; do
            if [ -z "${!var}" ]; then
              echo "[WARN] Missing secret: $var"
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send execution email (optional)
        if: always() && steps.email_config.outputs.enabled == 'true'
        id: send_email
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          secure: ${{ secrets.SMTP_SECURE || 'true' }}
          subject: "[Registration Web] Run #${{ github.run_number }} - ${{ job.status }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          html_body: |
            <h2>Registration automation summary</h2>
            <ul>
              <li><b>Job status:</b> ${{ job.status }}</li>
              <li><b>Total processed:</b> ${{ steps.summary.outputs.total }}</li>
              <li><b>OK:</b> ${{ steps.summary.outputs.ok }}</li>
              <li><b>OK partial:</b> ${{ steps.summary.outputs.ok_parcial }}</li>
              <li><b>Not confirmed:</b> ${{ steps.summary.outputs.nao_confirmado }}</li>
              <li><b>Error:</b> ${{ steps.summary.outputs.erro }}</li>
              <li><b>Critical failures:</b> ${{ steps.summary.outputs.falhas_criticas }}</li>
              <li><b>Success rate:</b> ${{ steps.summary.outputs.success_rate }}%</li>
            </ul>
            <p><a href="${{ env.RUN_URL }}">Open run in GitHub Actions</a></p>
            <p><a href="${{ env.DASHBOARD_URL }}">Open executive dashboard (Streamlit)</a></p>
          attachments: logs/run_summary.json,logs/run_summary.md

      - name: Report email status in summary
        if: always()
        run: |
          if [ "${{ steps.email_config.outputs.enabled }}" != "true" ]; then
            {
              echo ""
              echo "## 📧 Email status"
              echo "- ℹ️ Email was not sent because SMTP secrets are incomplete."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "${{ steps.send_email.outcome }}" = "success" ]; then
            {
              echo ""
              echo "## 📧 Email status"
              echo "- ✅ Email sent successfully."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo ""
              echo "## 📧 Email status"
              echo "- ⚠️ Email sending failed (core automation still completed)."
              echo "- Check SMTP credentials and username/password format."
              echo "- Gmail: use a 16-character App Password with 2FA enabled."
              echo "- Outlook/Office365: try port 587 with SMTP_SECURE=false."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload logs artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-registration-web-${{ github.run_id }}
          path: |
            logs/*.csv
            logs/*.html
            logs/*.pdf
            logs/run_summary.json
            logs/run_summary.md
            analytics/history_runs.csv
            analytics/detailed_runs.csv
          if-no-files-found: warn
          retention-days: 14
