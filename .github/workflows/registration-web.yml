name: Registration Web (Manual)

on:
  workflow_dispatch:

jobs:
  run-registration:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run automation
        env:
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          LOGIN_SENHA: ${{ secrets.LOGIN_SENHA }}
          HEADLESS: "1"
          KEEP_OPEN: "0"
          GERAR_RELATORIO: "1"
          SALVAR_PDF_FINAL: "0"
          SALVAR_HTML_FINAL: "1"
          TEMPO_CONFIRMACAO_ENVIO: "6"
          TEMPO_MAX_ESPERA_SEM_EVIDENCIA: "2.5"
          RELATORIO_PARCIAL_CADA: "10"
          HTML_PARCIAL_CADA: "25"
          OFFSET_REGISTROS: "0"
          LIMITE_REGISTROS: "0"
        run: python cadastro_web.py

      - name: Upload logs artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-registration-web-${{ github.run_id }}
          path: |
            logs/*.csv
            logs/*.html
          if-no-files-found: warn
