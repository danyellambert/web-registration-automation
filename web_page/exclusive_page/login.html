<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Login</title>
    <meta content="Login" property="og:title" />
    <meta content="Login" property="twitter:title" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link
      href="./login_assets/main_styles.css"
      rel="stylesheet"
      type="text/css"
      integrity="sha384-7bFqCIaA5LHGwECsl9wmm42btDtXiAStBq519O1myCYvjGw6F6C6ycy1mqIMmVbI"
      crossorigin="anonymous"
    />
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link
      href="https://fonts.gstatic.com"
      rel="preconnect"
      crossorigin="anonymous"
    />
    <script src="./login_assets/webfont.9f87595f89.js" type="text/javascript"></script>
    <script type="text/javascript">
      WebFont.load({
        google: {
          families: [
            "Montserrat:100,100italic,200,200italic,300,300italic,400,400italic,500,500italic,600,600italic,700,700italic,800,800italic,900,900italic",
            "Plus Jakarta Sans:300,400,500,600,700",
          ],
        },
      });
    </script>
    <script type="text/javascript">
      !(function (o, c) {
        var n = c.documentElement,
          t = " w-mod-";
        n.className += t + "js";
        ("ontouchstart" in o || (o.DocumentTouch && c instanceof DocumentTouch)) &&
          (n.className += t + "touch");
      })(window, document);
    </script>
    <link href="./assets/main_logo.webp" rel="shortcut icon" type="image/webp" />
    <link href="./assets/main_logo.webp" rel="apple-touch-icon" />
  </head>
  <body class="body">
    <div class="pglpy-secao">
      <div class="pglpy-container">
        <div class="pgtpy-div-titulo">
          <div class="pgtpy-titulo-copy">RegFlow Platform</div>
          <div class="pgtpy-subtitulo">Sign in to continue</div>
        </div>
        <div class="pgtpy-html w-embed">
          <form method="POST" action="#">
            <div class="form-inputs">
              <div class="form-campo">
                <label for="email">Email</label>
                <input
                  type="text"
                  id="email"
                  name="email"
                  placeholder="Your login email"
                />
                <small></small>
              </div>

              <div class="form-campo">
                <label for="password">Password</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Your password"
                />
                <small></small>
              </div>
            </div>

            <div class="form-botoes">
              <button type="submit" id="pgtpy-botao">Sign In</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="rodape">
      <div class="footer footer-claro">
        <div class="footer-container">
          <img
            src="./assets/main_logo.webp"
            loading="lazy"
            alt="RegFlow Platform logo"
            class="footer-logo"
          />
          <span class="footer-signature">Danyel Lambert</span>
        </div>
      </div>

      <div class="css w-embed">
        <style>
          * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
          }

          html {
            font-size: 62.5%;
          }

          .nova_linha:last-child {
            border-bottom: solid 1px rgba(0, 0, 0, 0.35);
          }

          form,
          .form-inputs {
            display: flex;
            flex-direction: column;
            gap: 2.4rem;
          }

          .form-campo {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
          }

          .form-campo label {
            margin-left: 1.2rem;
          }

          .form-campo input {
            border-radius: 50px;
            padding: 0.6rem 1.2rem;
            border: solid 1px rgba(0, 0, 0, 0.5);
            font-size: 1.8rem;
          }

          .form-botoes {
            align-self: center;
          }

          form button {
            padding: 0.8rem 3.2rem;
            font-size: inherit;
            line-height: inherit;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            border: none;
            background-color: #3898ec;
            border-right: solid 3px #246399;
            border-bottom: solid 3px #246399;
          }

          form button:hover {
            border-right: solid 3px #3898ec;
            border-bottom: solid 3px #3898ec;
          }

          form small {
            display: none;
            margin-top: 0.4rem;
            margin-left: 2rem;
            color: inherit;
            font-family: inherit;
            max-width: 100%;
          }

          .sucesso input {
            border: solid 2px green;
          }

          .error input {
            border: solid 2px red;
          }

          .error small {
            display: inline-block;
          }

          .footer-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            width: auto !important;
            max-width: none !important;
            overflow: visible !important;
          }

          .footer-logo {
            width: 7.2rem;
            height: auto;
          }

          .footer-signature {
            display: inline-block !important;
            padding: 0;
            border-radius: 0;
            background: transparent;
            box-shadow: none;
            font-size: 1.65rem;
            font-weight: 600;
            color: rgba(17, 24, 39, 0.92) !important;
            letter-spacing: 0.02em;
            line-height: 1;
            white-space: nowrap;
          }

          @media (max-width: 991px) {
            html {
              font-size: 56.25%;
            }
          }

          @media (max-width: 767px) {
            html {
              font-size: 50%;
            }
          }

          @media (max-width: 479px) {
            html {
              font-size: 43.75%;
            }

            .footer-container {
              flex-direction: column;
              gap: 0.6rem;
            }

            .footer-signature {
              font-size: 1.5rem;
            }
          }
        </style>
      </div>

      <div class="js w-embed w-script">
        <script>
          const formEl = document.querySelector("form");

          const required = (value) => (value === "" ? false : true);

          const showError = (input, message) => {
            const formField = input.parentElement;

            formField.classList.remove("sucesso");
            formField.classList.add("error");

            const error = formField.querySelector("small");
            error.textContent = message;
          };

          const showSuccess = (input) => {
            const formField = input.parentElement;

            formField.classList.remove("error");
            formField.classList.add("sucesso");

            const error = formField.querySelector("small");
            error.textContent = "";
          };

          const checkFields = () => {
            let response = true;
            const inputEls = document.querySelectorAll("input");

            inputEls.forEach(function (el) {
              const value = el.value.trim();

              if (!required(value)) {
                showError(el, "This field cannot be empty.");
                response = false;
              } else {
                showSuccess(el);
              }
            });

            return response;
          };

          formEl.addEventListener("submit", function (e) {
            e.preventDefault();

            const validForm = checkFields();

            if (validForm) {
              window.location.href = "products.html";
            }
          });
        </script>
      </div>
    </div>

    <script
      src="./login_assets/jquery-3.5.1.min.dc5e7f18c8.55a31caff3.js"
      type="text/javascript"
      integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
      crossorigin="anonymous"
    ></script>
    <script
      src="./login_assets/app_chunk_a.js"
      type="text/javascript"
      integrity="sha384-4abIlA5/v7XaW1HMXKBgnUuhnjBYJ/Z9C1OSg4OhmVw9O3QeHJ/qJqFBERCDPv7G"
      crossorigin="anonymous"
    ></script>
    <script
      src="./login_assets/app_chunk_b.js"
      type="text/javascript"
      integrity="sha384-Vc6Swgf9mXh/OGL8y8iDINrf33Hdh69/3Jz6u86/kht6oxGMkTpL9LOQpfquChGF"
      crossorigin="anonymous"
    ></script>
    <script
      src="./login_assets/main_app.js"
      type="text/javascript"
      integrity="sha384-DN0/k9o8rHtBgd6ESy1eyLrsswZZxc9m2O7v59vYpArngOdJtzjMHYyFEZDM0Yb4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
